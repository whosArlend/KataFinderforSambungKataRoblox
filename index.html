<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KataFinder</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <header class="app-header">

      <h1>KataFinder</h1>

      <p class="subtitle">
        Temukan kata Bahasa Indonesia dari KBBI untuk game Sambung Kata di Roblox.
      </p>

    </header>


    <main class="app-main">

      <section class="keyboard-section">

        <h2 class="section-title">Keyboard Huruf</h2>

        <div id="alphabet-buttons" class="alphabet-grid"></div>

      </section>



      <section class="search-section">

        <h2 class="section-title">Cari Kata</h2>

        <input
          id="search-input"
          type="text"
          placeholder="Ketik awalan kata, contoh: ma, ber, per..."
          autocomplete="off"
        >

        <div class="meta-row">

          <span id="result-count">
            Menunggu input...
          </span>

          <span class="meta-hint">
            Klik kata untuk menyalin
          </span>

        </div>

      </section>



      <section class="results-section">

        <div id="results" class="results-list"></div>

      </section>

    </main>



    <footer class="app-footer">

      <p>
        © 2026 KataFinder Project — whosArlend
      </p>

      <a
        href="https://github.com/whosArlend/KataFinder"
        target="_blank"
        rel="noopener noreferrer"
      >
        View Source on GitHub
      </a>

    </footer>

  </div>


  <div id="toast" class="toast"></div>

  <script src="script.js"></script>

</body>

</html>
